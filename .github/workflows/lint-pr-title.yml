name: Lint PR title

# Squash-merge uses the PR title as the squashed commit message,
# so the PR title must follow Conventional Commits — otherwise
# semantic-release on main can't classify the change.

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  lint:
    name: Validate Conventional Commit format
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            style
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^[A-Za-z].+$
          subjectPatternError: |
            The PR subject must start with a letter and not end with a period.
            Example: feat(map): add zoom-to-zone control
