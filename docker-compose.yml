services:
  agryfront:
    container_name: agryfront
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_DIR: /app
    image: agrifront:v1.0
    env_file: .env.local
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - NEXT_PUBLIC_API_URL=https://agrilogy-pi.com:8000
      - NEXT_TELEMETRY_DISABLED=1
    ports:
      - '3000:3000'
    restart: unless-stopped
