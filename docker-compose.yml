services:
  agrydevops:
    build: ./Devops/server
    ports:
      - "9090:9090"
    container_name: agroserver
    volumes:
      - ./shared_data:/shared  # Ensuring requests.json is shared
    networks:
      - agro
    restart: unless-stopped
  agryfrontend:
    build:
      context: ./front
    image: agryfrontend
    container_name: agryfrontend
    ports:
      - "3000:3000"
    networks:
      - agro
    depends_on:
      - agrybackend
    restart: unless-stopped
  agrybackend:
      build: ./back
      ports:
        - "8000:8000"
      container_name: agrybackend
      volumes:
        - ./back:/code
        - ./shared_data:/shared
      # depends_on:
      #   agrydata:
      #     condition: service_healthy    # Wait for Postgres to be ready!
      env_file: back/.env               # Pass DB creds to Django
      networks:
        - agro
      restart: unless-stopped

networks:
  agro:

volumes:
  data_database:
  shared_data:

