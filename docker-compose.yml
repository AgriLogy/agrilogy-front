version: "3"

services:
  agrydevops:
    build: ./Devops/server
    ports:
      - "9090:9090"
    container_name: agroserver
    volumes:
      - data:/app
    networks:
      - agro
    restart: unless-stopped

  agrybackend:
    build: ./back
    ports:
      - "8000:8000"
    container_name: agrybackend
    volumes:
      - ./back:/code
    depends_on:
      - agrydata
    networks:
      - agro
    restart: unless-stopped
  
  agrydata:
    container_name: agrydata
    image: postgres
    volumes:
      - data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 1s
      timeout: 5s
      retries: 10
    env_file:
      - back/.env
    networks:
      - agro
    restart: unless-stopped

  agryadminer:
    container_name: agryadminer
    image: adminer
    ports:
      - "8080:8080"
    networks:
      - agro
    restart: unless-stopped
  
  agryfrontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    image: frontend
    container_name: agryfrontend
    ports:
      - "3000:3000"               # Next.js dev server runs on 3000 by default
    depends_on:
      - agrybackend
    volumes:
      - ./front:/app
      - /app/node_modules
    environment:
      - HOST=0.0.0.0
      - CHOKIDAR_USEPOLLING=true 
    command: npm run dev
    networks:
      - agro
    restart: unless-stopped


networks:
  agro:

volumes:
  data:
