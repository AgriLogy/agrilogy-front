
services:
  agrydevops:
    build: ./Devops/server
    ports:
      - "9090:9090"
    container_name: agroserver
    volumes:
      - data_devops:/app
      - shared_data:/shared
    networks:
      - agro
    restart: unless-stopped

  agrybackend:
    build: ./back
    ports:
      - "8000:8000"
    container_name: agrybackend
    volumes:
      - ./back:/code
      - shared_data:/shared
    depends_on:
      - agrydata
    networks:
      - agro
    restart: unless-stopped
  
  agrydata:
    container_name: agrydata
    image: postgres
    volumes:
      - data_database:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 1s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: agrydata_db
      POSTGRES_USER: agry_admin
      POSTGRES_PASSWORD: Str0ngP@ssw0rd!
      POSTGRES_HOST: agrydata
      POSTGRES_PORT: 5432
    networks:
      - agro
    restart: unless-stopped


  agryadminer:
    container_name: agryadminer
    image: adminer
    ports:
      - "8080:8080"
    networks:
      - agro
    restart: unless-stopped
  
  agryfrontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    image: frontend
    container_name: agryfrontend
    ports:
      - "3000:3000"
    depends_on:
      - agrybackend
    volumes:
      - ./front:/app
      - /app/node_modules
    environment:
      - HOST=0.0.0.0
      - CHOKIDAR_USEPOLLING=true 
    command: npm run dev
    networks:
      - agro
    restart: unless-stopped


networks:
  agro:

volumes:
  data_database:
  data_devops:
  shared_data:

