# version: "3.9"

services:

  # agryfront:
  #   container_name: agryfront
  #   build:
  #     context: ./front        # <- path to your Next.js app
  #     dockerfile: Dockerfile  # <- the Dockerfile you shared
  #   image: agrifront:v1.0
  #   env_file: ./front/.env
  #   environment:
  #     - HOST=0.0.0.0
  #     - PORT=3000
  #     # Expose your backend URL to the browser code
  #     - NEXT_PUBLIC_API_URL=http://agrybackend:8000
  #     # optional: disable Next telemetry in CI/containers
  #     - NEXT_TELEMETRY_DISABLED=1
  #   ports:
  #     - "3000:3000"
  #   # Live-reload friendly: mount code in dev, keep node_modules inside container
  #   volumes:
  #     - ./front:/app
  #     - /app/node_modules
  #   networks:
  #     - agro
  #   restart: unless-stopped
  #   depends_on:
  #     agrybackend:
  #       condition: service_started
        
  agryadminer:
    container_name: agryadminer
    image: adminer
    environment:
      - ADMINER_DEFAULT_SERVER=agrydata
    ports:
      - "8080:8080"
    networks:
      - agro
    restart: unless-stopped
    depends_on:
      - agrydata

  agrydata:
    container_name: agrydata
    image: postgres:17
    volumes:
      - data_database:/var/lib/postgresql/data
    env_file: ./back/.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 2s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    networks:
      - agro
    restart: unless-stopped

  agrybackend:
    container_name: agrybackend
    build: ./back
    image: agriback:v1.0
    env_file: ./back/.env
    ports:
      - "8000:8000"
    volumes:
      - ./back:/code
      - ./shared_data:/shared
    networks:
      - agro
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      # uncomment if USE_POSTGRES=True
      agrydata:
        condition: service_started

  redis:
    container_name: redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 5s
    networks:
      - agro

  celery-beat:
    build:
      context: ./back
      dockerfile: Dockerfile
    command: >
      celery -A agriBack beat --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    working_dir: /code
    volumes:
      - ./back:/code
    env_file: ./back/.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agro

  celery-worker:
    build:
      context: ./back
      dockerfile: Dockerfile
    command: celery -A agriBack worker --loglevel=info --concurrency=1
    working_dir: /code
    volumes:
      - ./back:/code
    env_file: ./back/.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agro

networks:
  agro:

volumes:
  data_database:
  shared_data:
    driver: local
    driver_opts:
      type: none
      device: ./shared_data
      o: bind
