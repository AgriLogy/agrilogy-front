events {
    worker_connections 1024;
}

http {
    # Define a log format that includes the request body
    log_format json_logs '$remote_addr - $remote_user [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         '"$http_referer" "$http_user_agent" '
                         '"$request_body"';

    # Log to stdout
    access_log /dev/stdout json_logs;

    server {
        listen 9090;
        server_name localhost;

        # Enable request body logging
        location / {
            # Enable access log for this location
            access_log /dev/stdout json_logs;

            # Read and log the body of POST requests
            proxy_pass_request_body on;
            proxy_set_header Content-Length $content_length;

            # Return a simple success response
            return 200 "Data logged successfully\n";
        }

        # Handle request body size and buffering
        client_max_body_size 10M;
        client_body_buffer_size 128k;
    }
}
